name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # CLI — parser / codegen / headless visualize.
  # ------------------------------------------------------------------
  cli:
    name: cli (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # asn1-cli depends transitively on asn1-viz → eframe → GTK/X11 headers,
      # so the Linux build needs the same dev packages as the viz job.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev

      - run: cargo build --release --locked -p asn1-cli --target ${{ matrix.target }}
      - name: Package CLI
        shell: bash
        run: |
          name="asn1-decoder-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp LICENSE README.md "$name/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/asn1-decoder.exe" "$name/"
            7z a "$name.zip" "$name"
            echo "ARTIFACT=$name.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/asn1-decoder" "$name/"
            tar -czf "$name.tar.gz" "$name"
            echo "ARTIFACT=$name.tar.gz" >> "$GITHUB_ENV"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}

  # ------------------------------------------------------------------
  # asn1-tool — portable desktop GUI binary with embedded icon / manifest.
  # Linux is built on ubuntu-22.04 so the resulting glibc requirement
  # (2.35) covers all currently-supported mainstream distros.
  # ------------------------------------------------------------------
  tool:
    name: tool (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # GTK3 + xkb + wayland headers needed to build rfd (sync file dialogs)
      # and the egui winit backend on Linux. At runtime the target system
      # needs the matching shared libraries — see PORTABLE.md.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev

      - run: cargo build --release --locked -p asn1-tool --target ${{ matrix.target }}

      - name: Package asn1-tool
        shell: bash
        run: |
          name="asn1-tool-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp LICENSE README.md PORTABLE.md "$name/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/asn1-tool.exe" "$name/"
            # Drop a `portable.txt` marker into a variant ZIP so power users
            # can download a truly stateless build that writes next to itself.
            cp -r "$name" "$name-portable"
            : > "$name-portable/portable.txt"
            7z a "$name.zip" "$name"
            7z a "$name-portable.zip" "$name-portable"
            echo "ARTIFACT<<EOF" >> "$GITHUB_ENV"
            echo "$name.zip" >> "$GITHUB_ENV"
            echo "$name-portable.zip" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/asn1-tool" "$name/"
            chmod +x "$name/asn1-tool"
            cp -r "$name" "$name-portable"
            : > "$name-portable/portable.txt"
            tar -czf "$name.tar.gz" "$name"
            tar -czf "$name-portable.tar.gz" "$name-portable"
            echo "ARTIFACT<<EOF" >> "$GITHUB_ENV"
            echo "$name.tar.gz" >> "$GITHUB_ENV"
            echo "$name-portable.tar.gz" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
